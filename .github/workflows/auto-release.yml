name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next release version
        id: version
        shell: bash
        env:
          RELEASE_BUMP_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          existing_tag_on_head="$(git tag --points-at HEAD 'v*' | head -n 1 || true)"
          if [[ -n "$existing_tag_on_head" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=HEAD already tagged with ${existing_tag_on_head}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          changelog_version="$(grep -m1 -E '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | awk '{print $2}' || true)"
          package_version="$(node -p \"require('./package.json').version\" 2>/dev/null || true)"

          if [[ -z "$latest_tag" ]]; then
            bootstrap_version="${changelog_version:-$package_version}"

            if [[ -z "$bootstrap_version" ]]; then
              bootstrap_version="0.1.0"
            fi

            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "bump=bootstrap" >> "$GITHUB_OUTPUT"
            echo "release_version=$bootstrap_version" >> "$GITHUB_OUTPUT"
            echo "tag=v$bootstrap_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_messages="$(git log --format=%B \"${latest_tag}..HEAD\")"
          if [[ -z "$commit_messages" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=No commits found since ${latest_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bump="${RELEASE_BUMP_INPUT:-auto}"
          if [[ "$bump" == "auto" ]]; then
            bump="patch"

            if grep -Eiq 'BREAKING CHANGE|(^|[[:space:]])(major:|\[major\]|#major)|!:' <<< "$commit_messages"; then
              bump="major"
            elif grep -Eiq '(^|[[:space:]])(feat:|minor:|\[minor\]|#minor)' <<< "$commit_messages"; then
              bump="minor"
            fi
          fi

          base_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$base_version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump value: $bump"
              exit 1
              ;;
          esac

          release_version="${major}.${minor}.${patch}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Stop when no release is needed
        if: steps.version.outputs.skip == 'true'
        run: echo "${{ steps.version.outputs.reason }}"

      - name: Build release notes
        if: steps.version.outputs.skip != 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          RELEASE_BUMP: ${{ steps.version.outputs.bump }}
        run: |
          set -euo pipefail

          {
            echo "# ${RELEASE_TAG}"
            echo

            if [[ "$RELEASE_BUMP" == "bootstrap" ]]; then
              echo "Initial automated release created from the current repository baseline."
            else
              echo "Automated ${RELEASE_BUMP} release created from the latest changes on main."
            fi

            echo

            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "## Changes since ${PREVIOUS_TAG}"
              echo
              git log --no-merges --reverse --format='- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              echo "## Included baseline"
              echo

              changelog_section="$(awk '
                BEGIN { capture = 0 }
                /^## / {
                  if (capture) exit
                  if ($2 == version) capture = 1
                }
                capture { print }
              ' version="$RELEASE_VERSION" CHANGELOG.md)"

              if [[ -n "$changelog_section" ]]; then
                printf '%s\n' "$changelog_section"
              else
                git log --no-merges --reverse --format='- %s (%h)'
              fi
            fi
          } > RELEASE_NOTES.md

      - name: Create git tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          target_commitish: ${{ github.sha }}